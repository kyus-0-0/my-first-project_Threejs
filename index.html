<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 기본 페이지</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000; /* 레터박스(양옆 빈 공간) 색 */
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-container {
      position: relative;
      overflow: hidden;
      background: #cfd8dc;
    }
    canvas {
      display: block;
    }
    #debug-hud {
      position: absolute;
      top: 8px;
      left: 8px;
      color: #ffffff;
      text-shadow: 0 0 3px #000000, 0 0 3px #000000;
      font-family: monospace;
      font-size: 13px;
      white-space: pre;
      pointer-events: none;
      z-index: 10;
      display: none;
    }
    #space-hint {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      text-shadow: 0 0 4px #000000, 0 0 4px #000000;
      font-family: sans-serif;
      font-size: 18px;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 10;
      display: none;
    }
    #fullscreen-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 20;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.45);
      color: #ffffff;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="debug-hud"></div>
    <div id="space-hint">스페이스바 또는 화면을 눌러 시작하세요</div>
    <button id="fullscreen-btn" aria-label="전체화면 전환">⛶</button>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { FBXLoader } from "three/addons/loaders/FBXLoader.js";
    import { FontLoader } from "three/addons/loaders/FontLoader.js";
    import { TextGeometry } from "three/addons/geometries/TextGeometry.js";

    // 장면 생성
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcfd8dc);

    // 캐릭터를 따라다니는 3인칭 카메라 (RPG 스타일)
    const characterCamera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    characterCamera.position.set(0, 4.2, -4); // 캐릭터 뒤쪽에서 시작

    // 전체를 내려다보는 월드(관전) 카메라
    const worldCamera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    worldCamera.position.set(0, 18, 22);
    worldCamera.lookAt(0, 0, 0);

    // 렌더러
    const gameContainer = document.getElementById("game-container");
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    gameContainer.appendChild(renderer.domElement);

    // ── 로딩(인트로) 화면: "Hello World!!!" 를 한 글자씩 3D로 보여주다가
    //    스페이스바를 누르면 캐릭터 화면으로 전환한다 ──────────────────
    let appState = "intro"; // "intro" | "game"

    const introScene = new THREE.Scene();
    introScene.background = new THREE.Color(0x111318);

    const introCamera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    introCamera.position.set(0, 0, 10);

    // ── 화면 비율을 기기와 무관하게 항상 세로로 긴 모바일 화면처럼 고정 ──
    // 창(또는 풀스크린) 크기에 맞춰 9:16 비율 컨테이너를 가운데 배치하고,
    // 남는 공간은 레터박스(검은 여백)로 채운다. 실제 화면 회전/잠금 여부와
    // 무관하게 항상 같은 모양으로 보이기 때문에 기기 구분이 필요 없다.
    const PORTRAIT_ASPECT = 9 / 16;

    function resizeGameContainer() {
      const availableW = window.innerWidth;
      const availableH = window.innerHeight;
      let width = availableH * PORTRAIT_ASPECT;
      let height = availableH;
      if (width > availableW) {
        width = availableW;
        height = availableW / PORTRAIT_ASPECT;
      }
      gameContainer.style.width = `${width}px`;
      gameContainer.style.height = `${height}px`;

      renderer.setSize(width, height);
      for (const cam of [characterCamera, worldCamera, introCamera]) {
        cam.aspect = width / height;
        cam.updateProjectionMatrix();
      }
    }
    resizeGameContainer();

    // 전체화면 토글 버튼
    // pointerdown 단계에서 stopPropagation 해야, window의 "탭하면 시작"
    // 리스너로 이벤트가 버블링돼서 같이 게임이 시작돼버리는 걸 막을 수 있다.
    const fullscreenBtn = document.getElementById("fullscreen-btn");
    fullscreenBtn.addEventListener("pointerdown", (e) => {
      e.stopPropagation();
    });
    fullscreenBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        gameContainer.requestFullscreen?.().catch(() => {});
      } else {
        document.exitFullscreen?.();
      }
    });
    document.addEventListener("fullscreenchange", () => {
      fullscreenBtn.textContent = document.fullscreenElement ? "⤢" : "⛶";
      // 전체화면 진입 시 지원하는 기기에서는 세로 방향으로 고정도 시도한다
      // (지원 안 하면 조용히 무시되고, 레터박스 방식으로는 항상 세로로 보인다)
      if (document.fullscreenElement) {
        screen.orientation?.lock?.("portrait").catch(() => {});
      }
      resizeGameContainer();
    });
    window.addEventListener("resize", resizeGameContainer);
    window.addEventListener("orientationchange", resizeGameContainer);

    introScene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const introLight = new THREE.DirectionalLight(0xffffff, 0.8);
    introLight.position.set(3, 4, 6);
    introScene.add(introLight);

    const introFullText = "Hello World!!!";
    const introLetterInterval = 0.15; // 글자 하나 나오는 간격(초)
    let introFont = null;
    let introTextMesh = null;
    let introRevealedCount = 0;
    let introTimer = 0;
    let introReadyForSpace = false;

    const spaceHint = document.getElementById("space-hint");

    function rebuildIntroText() {
      if (introTextMesh) {
        introScene.remove(introTextMesh);
        introTextMesh.geometry.dispose();
        introTextMesh.material.dispose();
      }
      const displayText = introFullText.slice(0, introRevealedCount);
      if (!introFont || displayText.length === 0) return;

      const geometry = new TextGeometry(displayText, {
        font: introFont,
        size: 1,
        depth: 0.25,
        curveSegments: 8,
      });
      geometry.computeBoundingBox();
      const centerX = -0.5 * (geometry.boundingBox.max.x - geometry.boundingBox.min.x);
      const centerY = -0.5 * (geometry.boundingBox.max.y - geometry.boundingBox.min.y);

      const material = new THREE.MeshStandardMaterial({ color: 0xffe08a });
      introTextMesh = new THREE.Mesh(geometry, material);
      introTextMesh.position.set(centerX, centerY, 0);
      introScene.add(introTextMesh);
    }

    const fontLoader = new FontLoader();
    fontLoader.load(
      "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/fonts/helvetiker_regular.typeface.json",
      (loadedFont) => {
        introFont = loadedFont;
      },
      undefined,
      (error) => {
        console.error("인트로 폰트 로드 실패:", error);
      }
    );

    function updateIntro(delta) {
      if (!introFont || introRevealedCount >= introFullText.length) return;
      introTimer += delta;
      if (introTimer < introLetterInterval) return;
      introTimer -= introLetterInterval;
      introRevealedCount += 1;
      rebuildIntroText();
      if (introRevealedCount === introFullText.length) {
        introReadyForSpace = true;
        spaceHint.style.display = "block";
      }
    }

    // 스페이스바/탭으로 시작한 직후 그 입력이 그대로 지면 클릭(이동)으로
    // 이어지는 걸 막기 위해, 곧바로 "game" 상태로 가지 않고
    // "spawn"(스폰 연출) 상태를 한 번 거친다. spawn 동안은 이동/카메라 전환/
    // 지면 클릭이 전부 무시된다.
    const spawnMarker = new THREE.Mesh(
      new THREE.SphereGeometry(1, 24, 24),
      new THREE.MeshBasicMaterial({ color: 0x22cc44 })
    );
    spawnMarker.visible = false;
    scene.add(spawnMarker);

    const spawnDuration = 2; // 초
    const spawnMaxScale = 3;
    let spawnElapsed = 0;

    function beginSpawnSequence() {
      appState = "spawn";
      spaceHint.style.display = "none";
      spawnElapsed = 0;
      spawnMarker.position.set(0, 0, 0);
      spawnMarker.scale.setScalar(0.0001);
      spawnMarker.visible = true;
      controllable.visible = false; // 스폰 연출이 끝나기 전까지 캐릭터(임시 박스 포함)를 숨긴다
    }

    function updateSpawnSequence(delta) {
      spawnElapsed += delta;
      const t = Math.min(spawnElapsed / spawnDuration, 1);
      spawnMarker.scale.setScalar(spawnMaxScale * t);
      if (t >= 1) {
        spawnMarker.visible = false;
        controllable.visible = true;
        finishStartingGame();
      }
    }

    function finishStartingGame() {
      appState = "game";
      debugHud.style.display = "block";
      for (const key of Object.keys(keysPressed)) keysPressed[key] = false;
    }

    function tryStartGame() {
      if (appState === "intro" && introReadyForSpace) beginSpawnSequence();
    }

    // 모바일에는 키보드가 없어서 스페이스바를 누를 수 없으니, 화면을
    // 탭/클릭해도 시작하게 한다 (기기 구분 없이 둘 다 항상 지원).
    window.addEventListener("pointerdown", () => {
      tryStartGame();
    });

    // 이동이 잘 되는지 눈으로 확인하기 쉽도록 바둑판(체크판) 패턴 텍스처 생성
    function createCheckerTexture(colorA = "#aaaaaa", colorB = "#777777") {
      const size = 64;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = colorA;
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = colorB;
      ctx.fillRect(0, 0, size / 2, size / 2);
      ctx.fillRect(size / 2, size / 2, size / 2, size / 2);
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.magFilter = THREE.NearestFilter;
      return texture;
    }

    // 지면(바닥) - 한 칸이 1 x 1 유닛이 되도록 반복 횟수 설정 (50 유닛 / 2 유닛 타일 = 25)
    const groundGeometry = new THREE.PlaneGeometry(50, 50);
    const checkerTexture = createCheckerTexture();
    checkerTexture.repeat.set(25, 25);
    const groundMaterial = new THREE.MeshStandardMaterial({ map: checkerTexture });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // 지면 클릭 시 초록색 스피어를 잠깐 표시했다가 사라지게 하는 클릭 마커
    const clickMarker = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0x22cc44, transparent: true, opacity: 1 })
    );
    clickMarker.visible = false;
    scene.add(clickMarker);

    let clickMarkerElapsed = 0;
    const clickMarkerDuration = 0.6; // 초

    function showClickMarker(point) {
      clickMarker.position.set(point.x, 0.05, point.z);
      clickMarker.material.opacity = 1;
      clickMarker.visible = true;
      clickMarkerElapsed = 0;
    }

    function updateClickMarker(delta) {
      if (!clickMarker.visible) return;
      clickMarkerElapsed += delta;
      const t = Math.min(clickMarkerElapsed / clickMarkerDuration, 1);
      clickMarker.material.opacity = 1 - t;
      if (t >= 1) clickMarker.visible = false;
    }

    // 지면을 클릭하면 그 지점을 이동 목표로 저장한다 (드래그로 카메라를
    // 돌리는 것과 구분하기 위해, 클릭/뗀 지점의 거리가 짧을 때만 이동으로 처리)
    let moveTarget = null;
    const raycaster = new THREE.Raycaster();
    const pointerNDC = new THREE.Vector2();
    let pointerDownPos = null;

    renderer.domElement.addEventListener("pointerdown", (e) => {
      if (e.button === 0) pointerDownPos = { x: e.clientX, y: e.clientY };
    });

    renderer.domElement.addEventListener("pointerup", (e) => {
      if (e.button !== 0 || !pointerDownPos) return;
      const dx = e.clientX - pointerDownPos.x;
      const dy = e.clientY - pointerDownPos.y;
      pointerDownPos = null;
      if (Math.hypot(dx, dy) > 5) return; // 드래그(카메라 회전)로 간주해 무시
      if (appState !== "game") return;

      const rect = renderer.domElement.getBoundingClientRect();
      pointerNDC.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      pointerNDC.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointerNDC, activeCamera);
      const hits = raycaster.intersectObject(ground);
      if (hits.length === 0) return;

      moveTarget = hits[0].point.clone();
      showClickMarker(hits[0].point);
    });

    // 조명
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    // ch_02.fbx가 아직 없을 때 (0,0,0) 위치를 표시해주는 임시 박스
    const placeholderBox = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 1),
      new THREE.MeshStandardMaterial({ color: 0x4488ff, wireframe: true })
    );
    placeholderBox.position.set(0, 0.5, 0); // 바닥(y=0)에 발이 닿도록 배치
    scene.add(placeholderBox);

    // WASD / 방향키로 움직일 대상 (fbx 로딩 전까지는 임시 박스)
    let controllable = placeholderBox;

    // models/ch_02.fbx 가 저장소에 올라오면 자동으로 불러와 임시 박스 자리에 표시
    let modelStatus = "로딩 중...";
    const textureLoader = new THREE.TextureLoader();
    const fbxLoader = new FBXLoader();
    fbxLoader.load(
      "./models/ch_02.fbx",
      (object) => {
        scene.remove(placeholderBox);
        scene.add(object);

        // fbx 원본 스케일을 모르기 때문에, 실제 크기를 측정해서
        // 사람 키 정도(1.8 유닛)에 맞춰 자동으로 스케일을 계산한다.
        const box = new THREE.Box3().setFromObject(object);
        const size = box.getSize(new THREE.Vector3());
        const desiredHeight = 1.8;
        const scale = size.y > 0.0001 ? desiredHeight / size.y : 1;
        object.scale.setScalar(scale);

        // 스케일 적용 후 다시 측정해서 중심을 (x,z)=0 에, 발을 y=0 바닥에 맞춘다.
        const scaledBox = new THREE.Box3().setFromObject(object);
        const center = scaledBox.getCenter(new THREE.Vector3());
        object.position.x -= center.x;
        object.position.z -= center.z;
        object.position.y -= scaledBox.min.y;

        controllable = object;
        previousControllablePosition.copy(object.position);

        // 업로드된 텍스처를 캐릭터 메시에 입힌다.
        textureLoader.load(
          "./models/texture/ch_map_02.jpeg",
          (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.flipY = false; // fbx는 이미지 UV 원점이 반대라 FBXLoader와 동일하게 맞춰준다
            object.traverse((child) => {
              if (!child.isMesh) return;
              const materials = Array.isArray(child.material) ? child.material : [child.material];
              for (const mat of materials) {
                mat.map = texture;
                mat.needsUpdate = true;
              }
            });
            console.log("ch_map_02.jpeg 텍스처 적용 완료");
          },
          undefined,
          (error) => {
            console.error("ch_map_02.jpeg 텍스처 로드 실패:", error);
          }
        );

        modelStatus = "로드 완료";
        console.log(
          `ch_02.fbx 로드 완료 (원본 크기: ${size.x.toFixed(2)} x ${size.y.toFixed(2)} x ${size.z.toFixed(2)}, 적용 스케일: ${scale.toFixed(4)})`
        );
      },
      (xhr) => {
        if (xhr.lengthComputable) {
          modelStatus = `로딩 중... ${((xhr.loaded / xhr.total) * 100).toFixed(0)}%`;
        }
      },
      (error) => {
        modelStatus = "로드 실패 (콘솔 확인)";
        console.error("ch_02.fbx 로드 실패:", error);
      }
    );

    // 캐릭터 카메라 위치를 확인용으로 표시하는 마커 (월드 카메라에서 보임)
    const cameraMarker = new THREE.Mesh(
      new THREE.ConeGeometry(0.3, 0.6, 12),
      new THREE.MeshStandardMaterial({ color: 0xff3333 })
    );
    cameraMarker.rotation.x = Math.PI / 2; // 원뿔 끝이 앞을 보도록 정렬
    scene.add(cameraMarker);

    // 카메라 컨트롤 (카메라별로 따로 두고, 활성화된 것만 사용)
    const characterControls = new OrbitControls(characterCamera, renderer.domElement);
    characterControls.enableDamping = true;
    // 위/아래로 너무 많이 돌리면 캐릭터가 화면 밖으로 나가버리니 각도를 좁게 제한
    const verticalOrbitLimitUp = THREE.MathUtils.degToRad(35); // 수평 기준 위쪽 35도 (카메라를 더 높였더니 이전 범위를 벗어나서 넉넉하게 조정)
    const verticalOrbitLimitDown = THREE.MathUtils.degToRad(5); // 수평 기준 아래쪽 5도
    characterControls.minPolarAngle = Math.PI / 2 - verticalOrbitLimitUp;
    characterControls.maxPolarAngle = Math.PI / 2 + verticalOrbitLimitDown;
    // 마우스 휠 줌 범위: 캐릭터와의 거리 2.5(최소) ~ 10(최대)
    characterControls.minDistance = 2.5;
    characterControls.maxDistance = 10;

    const worldControls = new OrbitControls(worldCamera, renderer.domElement);
    worldControls.enableDamping = true;
    worldControls.target.set(0, 0, 0);

    let activeCamera = characterCamera;
    let activeControls = characterControls;

    function setCameraMode(mode) {
      if (mode === "world") {
        activeCamera = worldCamera;
        activeControls = worldControls;
        characterControls.enabled = false;
        worldControls.enabled = true;
      } else {
        activeCamera = characterCamera;
        activeControls = characterControls;
        worldControls.enabled = false;
        characterControls.enabled = true;
      }
      console.log(mode === "world" ? "월드 카메라로 전환" : "캐릭터 카메라로 전환");
    }

    // WASD / 방향키 이동 처리 + "[" 로 카메라 전환
    const keysPressed = {};
    const moveKeys = new Set([
      "w", "a", "s", "d",
      "arrowup", "arrowdown", "arrowleft", "arrowright",
    ]);
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.key === " ") {
        if (appState === "intro") e.preventDefault();
        tryStartGame();
      }
      if (appState !== "game") return; // 인트로/스폰 연출 중에는 이동/카메라 전환 키를 무시한다

      const key = e.key.toLowerCase();
      if (moveKeys.has(key)) e.preventDefault();
      keysPressed[key] = true;

      if (e.key === "[") {
        setCameraMode(activeCamera === characterCamera ? "world" : "character");
      }
    });
    window.addEventListener("keyup", (e) => {
      keysPressed[e.key.toLowerCase()] = false;
    });

    const moveSpeed = 3; // 초당 이동 거리 (단위: three.js 월드 유닛)
    const worldUp = new THREE.Vector3(0, 1, 0);
    const cameraForward = new THREE.Vector3();
    const cameraRight = new THREE.Vector3();
    const moveDirection = new THREE.Vector3();

    // 캐릭터 카메라가 바라보는 방향을 기준으로 이동시킨다.
    // (W = 화면 안쪽, D = 화면 오른쪽 처럼 항상 화면 기준과 일치하게 하기 위함)
    function updateMovement(delta) {
      let inputX = 0;
      let inputZ = 0;
      if (keysPressed["w"] || keysPressed["arrowup"]) inputZ += 1;
      if (keysPressed["s"] || keysPressed["arrowdown"]) inputZ -= 1;
      if (keysPressed["a"] || keysPressed["arrowleft"]) inputX -= 1;
      if (keysPressed["d"] || keysPressed["arrowright"]) inputX += 1;

      if (inputX === 0 && inputZ === 0) {
        // WASD 입력이 없으면 클릭으로 지정해둔 목표 지점을 향해 이동한다.
        if (moveTarget) moveTowardClickTarget(delta);
        return;
      }

      moveTarget = null; // 키보드로 직접 조작하면 클릭 이동은 취소

      // 카메라가 실제로 바라보고 있는 지점(target)에서 카메라 위치를 뺀 벡터를
      // "정면"으로 사용한다. getWorldDirection()은 이번 프레임에 아직 반영되지
      // 않은(한 프레임 지연된) 회전값을 읽을 수 있어서 target 기준으로 계산한다.
      cameraForward.copy(characterControls.target).sub(characterCamera.position);
      cameraForward.y = 0;
      cameraForward.normalize();
      cameraRight.crossVectors(cameraForward, worldUp).normalize();

      moveDirection
        .set(0, 0, 0)
        .addScaledVector(cameraForward, inputZ)
        .addScaledVector(cameraRight, inputX)
        .normalize();

      controllable.position.addScaledVector(moveDirection, moveSpeed * delta);
      controllable.rotation.y = Math.atan2(moveDirection.x, moveDirection.z);
    }

    // 클릭으로 지정한 지점(moveTarget)을 향해 일정한 속도로 스무스하게 이동시킨다.
    const toClickTarget = new THREE.Vector3();
    function moveTowardClickTarget(delta) {
      toClickTarget.copy(moveTarget).sub(controllable.position);
      toClickTarget.y = 0;
      const distance = toClickTarget.length();
      const arriveThreshold = 0.05;
      if (distance <= arriveThreshold) {
        moveTarget = null;
        return;
      }
      const step = Math.min(distance, moveSpeed * delta);
      toClickTarget.normalize();
      controllable.position.addScaledVector(toClickTarget, step);
      controllable.rotation.y = Math.atan2(toClickTarget.x, toClickTarget.z);
    }

    // 캐릭터가 이동한 만큼 캐릭터 카메라도 같이 이동시켜서, 마우스로 맞춰둔
    // 시점(각도/거리)을 유지한 채로 뒤에서 계속 따라가게 한다.
    // (월드 카메라를 보고 있는 동안에도 계속 갱신되어, 전환 시 바로 올바른 위치에 있다.)
    const previousControllablePosition = controllable.position.clone();
    const cameraLookOffset = new THREE.Vector3(0, 1.6, 0); // 캐릭터 머리 높이 정도를 바라봄 (캐릭터 키 1.8 기준)

    function updateCameraFollow() {
      const moved = controllable.position.clone().sub(previousControllablePosition);
      characterCamera.position.add(moved);
      characterControls.target.copy(controllable.position).add(cameraLookOffset);
      previousControllablePosition.copy(controllable.position);

      // 확인용 마커를 캐릭터 카메라 위치/방향에 맞춰 갱신
      cameraMarker.position.copy(characterCamera.position);
      cameraMarker.lookAt(characterControls.target);
    }

    // 디버그용 HUD: 캐릭터/카메라 현재 위치를 화면 왼쪽 위에 텍스트로 표시
    const debugHud = document.getElementById("debug-hud");
    function formatVector(v) {
      return `(${v.x.toFixed(2)}, ${v.y.toFixed(2)}, ${v.z.toFixed(2)})`;
    }
    function updateDebugHud() {
      const cameraModeLabel = activeCamera === characterCamera ? "캐릭터 카메라" : "월드 카메라";
      debugHud.textContent =
        `캐릭터 위치: ${formatVector(controllable.position)}\n` +
        `카메라 위치: ${formatVector(characterCamera.position)} (${cameraModeLabel})\n` +
        `모델 상태: ${modelStatus}`;
    }

    // 렌더 루프
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (appState === "intro") {
        updateIntro(delta);
        renderer.render(introScene, introCamera);
        return;
      }

      if (appState === "spawn") {
        updateSpawnSequence(delta);
        updateCameraFollow();
        activeControls.update();
        renderer.render(scene, activeCamera);
        return;
      }

      updateMovement(delta);
      updateCameraFollow();
      updateClickMarker(delta);
      updateDebugHud();
      activeControls.update();
      renderer.render(scene, activeCamera);
    }
    animate();
  </script>
</body>
</html>
