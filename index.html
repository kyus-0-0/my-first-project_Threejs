<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 기본 페이지</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #cfd8dc;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { FBXLoader } from "three/addons/loaders/FBXLoader.js";

    // 장면 생성
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcfd8dc);

    // 카메라
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    // 렌더러
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 지면(바닥)
    const groundGeometry = new THREE.PlaneGeometry(50, 50);
    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x999999 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // 조명
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    // ch.fbx가 아직 없을 때 (0,0,0) 위치를 표시해주는 임시 박스
    const placeholderBox = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 1),
      new THREE.MeshStandardMaterial({ color: 0x4488ff, wireframe: true })
    );
    placeholderBox.position.set(0, 0.5, 0); // 바닥(y=0)에 발이 닿도록 배치
    scene.add(placeholderBox);

    // WASD / 방향키로 움직일 대상 (fbx 로딩 전까지는 임시 박스)
    let controllable = placeholderBox;

    // models/ch.fbx 가 저장소에 올라오면 자동으로 불러와 임시 박스 자리에 표시
    const fbxLoader = new FBXLoader();
    fbxLoader.load(
      "./models/ch.fbx",
      (object) => {
        scene.remove(placeholderBox);
        object.position.set(0, 0, 0);
        object.scale.setScalar(0.01); // fbx 스케일이 크게 나오면 조정하세요
        scene.add(object);
        controllable = object;
      },
      undefined,
      () => {
        console.log("models/ch.fbx가 아직 없어서 임시 박스를 표시합니다.");
      }
    );

    // 카메라 컨트롤
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // WASD / 방향키 이동 처리
    const keysPressed = {};
    const moveKeys = new Set([
      "w", "a", "s", "d",
      "arrowup", "arrowdown", "arrowleft", "arrowright",
    ]);
    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (moveKeys.has(key)) e.preventDefault();
      keysPressed[key] = true;
    });
    window.addEventListener("keyup", (e) => {
      keysPressed[e.key.toLowerCase()] = false;
    });

    const moveSpeed = 3; // 초당 이동 거리 (단위: three.js 월드 유닛)

    function updateMovement(delta) {
      let moveX = 0;
      let moveZ = 0;
      if (keysPressed["w"] || keysPressed["arrowup"]) moveZ -= 1;
      if (keysPressed["s"] || keysPressed["arrowdown"]) moveZ += 1;
      if (keysPressed["a"] || keysPressed["arrowleft"]) moveX -= 1;
      if (keysPressed["d"] || keysPressed["arrowright"]) moveX += 1;

      if (moveX === 0 && moveZ === 0) return;

      const length = Math.hypot(moveX, moveZ);
      moveX /= length;
      moveZ /= length;

      controllable.position.x += moveX * moveSpeed * delta;
      controllable.position.z += moveZ * moveSpeed * delta;
      controllable.rotation.y = Math.atan2(moveX, moveZ);
    }

    // 창 크기 변경 대응
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 렌더 루프
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      updateMovement(delta);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
